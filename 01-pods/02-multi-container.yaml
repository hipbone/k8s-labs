# 사이드카 패턴: writer가 만든 로그 파일을 reader가 읽음.
# 두 컨테이너가 같은 emptyDir 볼륨을 공유한다.
apiVersion: v1
kind: Pod
metadata:
  name: sidecar-demo
  namespace: lab-pods
spec:
  containers:
    - name: writer
      image: busybox:1.36
      command:
        - sh
        - -c
        - |
          i=0
          while true; do
            echo "$(date) line=$i" >> /var/log/app.log
            i=$((i+1))
            sleep 2
          done
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log

    - name: reader
      image: busybox:1.36
      command: ["sh", "-c", "tail -F /var/log/app.log"]
      volumeMounts:
        - name: shared-logs
          mountPath: /var/log

  volumes:
    - name: shared-logs
      emptyDir: {}
