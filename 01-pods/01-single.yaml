apiVersion: v1
kind: Namespace
metadata:
  name: lab-pods
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: lab-pods
  labels:
    app: nginx
spec:
  containers:
    - name: nginx
      image: nginx:1.25-alpine
      ports:
        - containerPort: 80
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
