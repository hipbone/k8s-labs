kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-labs
nodes:
  - role: control-plane
    # Ingress 실습을 위해 호스트의 80/443을 control-plane 노드로 포워딩.
    # NodePort 실습용 30080도 함께 열어둠.
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
    # ingress-nginx가 control-plane 노드에 스케줄될 수 있도록 라벨 부여.
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
  - role: worker
  - role: worker
